name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

jobs:
  examples:
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: ["ubuntu-latest", "windows-latest"]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r examples/requirements.txt --no-dependencies
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
    - run: ./mill -i scala.examples.test

  test:
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: [ubuntu-latest]
        SCALA: [2.12.20, 2.12.21, 2.13.17, 2.13.18, 3.3.7, 3.4.3, 3.5.2, 3.6.4, 3.7.3, 3.8.1]
        include:
          - OS: windows-latest
            SCALA: 2.13.18
          - OS: macos-15
            SCALA: 2.13.18
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
        apps:
    - run: ./mill -i "__[$SCALA].test"
      shell: bash
      if: runner.os != 'Windows'
      env:
        SCALA: ${{ matrix.SCALA }}
    - run: ./mill -i __[%SCALA%].test
      if: runner.os == 'Windows'
      env:
        SCALA: ${{ matrix.SCALA }}

  integration-tests:
    runs-on: ${{ matrix.OS }}
    # Room for the retry below to run the suite a second time on a transient infrastructure flake.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        OS: ["ubuntu-22.04", macos-15, windows-latest]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
        apps: scala-cli
    # Retry the whole suite once as a backstop: the integration tests occasionally hit transient
    # infrastructure issues (overloaded runner, ZeroMQ connection timeouts) that the in-test retries
    # don't fully absorb. This is a coarse safety net - the per-test retries and the ZeroMQ cleanup
    # fixes in the test harness should keep it from triggering in the common case.
    - name: Run integration tests
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 75
        max_attempts: 2
        retry_on: error
        shell: bash
        command: .github/scripts/run/run-its.sh

  bincompat:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
    - run: ./mill __.mimaReportBinaryIssues
      shell: bash

  website:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
        apps: cs
    - run: ./mill docs.generate
      shell: bash

  format:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
        apps: scalafmt
    - run: scalafmt --check

  publishLocal:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/setup-action@v3.0
      with:
        jvm: 21
        apps:
    - run: |
        mv .mill-jvm-opts .mill-jvm-opts.bak
        echo "-Xmx2g" > .mill-jvm-opts
        cat .mill-jvm-opts.bak | grep -v Xmx >> .mill-jvm-opts
        # sometimes running into memory issues when attempting __.publishLocal upfront
        for SV in $(./mill -i dev.scalaVersions); do
          ./mill -i '__['"$SV"'].compile'
          ./mill -i '__['"$SV"'].docJar'
          ./mill -i '__['"$SV"'].publishLocal'
        done
        ./mill -i __.publishLocal
      shell: bash

  # job whose name doesn't change when we bump Scala versions, add OSes, …
  # We require this job for auto-merge.
  all-tests:
    needs: [examples, bincompat, test, integration-tests, website, publishLocal]
    runs-on: ubuntu-latest
    steps:
    - run: true
      shell: bash
